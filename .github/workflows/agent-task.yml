name: Run Agent Task

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:
    inputs:
      task_id:
        description: "Supabase task UUID to run"
        required: false
        default: ""

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q \
            chromium-browser \
            libglib2.0-0 \
            libnss3 \
            libfontconfig1 \
            libx11-xcb1 \
            libxcomposite1 \
            libxcursor1 \
            libxdamage1 \
            libxi6 \
            libxtst6 \
            libatk-bridge2.0-0 \
            libgtk-3-0 \
            libgbm1 \
            libxrandr2 \
            libxss1 \
            libasound2t64 || true

      - name: Install Python packages
        run: |
          pip install --upgrade pip
          pip install playwright httpx supabase python-dotenv
          pip install browser-use langchain-google-genai || true
          playwright install chromium --with-deps

      - name: Run agent task
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CEREBRAS_API_KEYS: ${{ secrets.CEREBRAS_API_KEYS }}
          NOPECHA_API_KEY: ${{ secrets.NOPECHA_API_KEY }}
          TASK_ID: ${{ github.event.inputs.task_id }}
        run: |
          if [ -n "$TASK_ID" ]; then
            echo "Running specific task: $TASK_ID"
            python scripts/browser_use_worker.py "$TASK_ID"
          else
            echo "Running all pending tasks..."
            python scripts/run_pending_tasks.py
          fi
