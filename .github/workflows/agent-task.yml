name: Run Agent Task

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:
    inputs:
      task_id:
        description: "Supabase task UUID to run (leave blank for all pending)"
        required: false
        default: ""

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q \
            libglib2.0-0 \
            libnss3 \
            libfontconfig1 \
            libx11-xcb1 \
            libxcomposite1 \
            libxcursor1 \
            libxdamage1 \
            libxi6 \
            libxtst6 \
            libatk-bridge2.0-0 \
            libgtk-3-0 \
            libgbm1 \
            libxrandr2 \
            libxss1 \
            libasound2t64 \
            libxfixes3 \
            libxext6 || true

      - name: Install Python packages (browser-use + langchain + supabase)
        run: |
          pip install --upgrade pip --quiet
          pip install \
            "browser-use==0.1.40" \
            "langchain-cerebras>=0.1.0" \
            "langchain-openai>=0.2.0" \
            "langchain>=0.3.0" \
            "langchain-core>=0.3.0" \
            playwright \
            httpx \
            "supabase>=2.0.0" \
            python-dotenv \
            --quiet
          python -c "import browser_use; print('browser-use version:', browser_use.__version__)" || true

      - name: Install Playwright browser (Chromium)
        run: playwright install chromium --with-deps

      - name: Validate environment
        run: |
          python -c "from browser_use import Agent; print('browser-use Agent OK')"
          python -c "from langchain_cerebras import ChatCerebras; print('langchain-cerebras OK')"
          python -c "from langchain_openai import ChatOpenAI; print('langchain-openai OK')"
          python -c "from supabase import create_client; print('supabase OK')"
          python -c "import httpx; print('httpx OK')"
          python -c "import playwright; print('playwright OK')"
          python -c "
          try:
            from browser_use import Browser, BrowserConfig
            print('browser-use Browser/BrowserConfig: top-level import OK')
          except ImportError:
            try:
              from browser_use.browser.browser import Browser, BrowserConfig
              print('browser-use Browser/BrowserConfig: browser.browser import OK')
            except ImportError:
              print('browser-use Browser/BrowserConfig: using Agent-only mode')
          "

      - name: Run agent task
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CEREBRAS_API_KEYS:         ${{ secrets.CEREBRAS_API_KEYS }}
          NOPECHA_API_KEY:           ${{ secrets.NOPECHA_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID:     ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_KEY:        ${{ secrets.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_MODEL:          ${{ secrets.CLOUDFLARE_MODEL }}
          TASK_ID:                   ${{ github.event.inputs.task_id }}
        run: |
          if [ -n "$TASK_ID" ]; then
            echo "=== Running specific task: $TASK_ID ==="
            python scripts/browser_use_worker.py "$TASK_ID"
          else
            echo "=== Running all pending tasks ==="
            python scripts/run_pending_tasks.py
          fi
